# ==============================================================================
# BeaconLink
# .markdownlint.yaml
#
# Documentation:
# https://github.com/DavidAnson/markdownlint
# ==============================================================================

# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------

default: true

# ------------------------------------------------------------------------------
# Headings
# ------------------------------------------------------------------------------

MD001: true # Heading levels increment by one
MD003:
  style: atx

MD022:
  lines_above: 1
  lines_below: 1

MD023: true

MD024:
  siblings_only: true

MD025:
  front_matter_title: ""

MD026:
  punctuation: ".,;:!?。，；：！？"

MD041: false

# ------------------------------------------------------------------------------
# Lists
# ------------------------------------------------------------------------------

MD004:
  style: dash

MD005: true

MD006: true

MD007:
  indent: 2

MD029:
  style: ordered

MD030:
  ul_single: 1
  ol_single: 1
  ul_multi: 1
  ol_multi: 1

MD032: true

# ------------------------------------------------------------------------------
# Code
# ------------------------------------------------------------------------------

MD031: true

MD038: true

MD040: true

MD046:
  style: fenced

MD048:
  style: backtick

# ------------------------------------------------------------------------------
# Blockquotes
# ------------------------------------------------------------------------------

MD027: true
MD028: true

# ------------------------------------------------------------------------------
# Horizontal Rules
# ------------------------------------------------------------------------------

MD035:
  style: "---"

# ------------------------------------------------------------------------------
# Links
# ------------------------------------------------------------------------------

MD034: true
MD039: true
MD042: true

# ------------------------------------------------------------------------------
# Tables
# ------------------------------------------------------------------------------

MD055: true
MD056: true

# ------------------------------------------------------------------------------
# Whitespace
# ------------------------------------------------------------------------------

MD009:
  br_spaces: 2
  strict: false

MD010: true
MD012:
  maximum: 1

# ------------------------------------------------------------------------------
# Line Length
# ------------------------------------------------------------------------------

MD013:
  line_length: 120
  heading_line_length: 120
  code_blocks: false
  tables: false
  headings: false
  stern: false

# ------------------------------------------------------------------------------
# Emphasis
# ------------------------------------------------------------------------------

MD036: false

# ------------------------------------------------------------------------------
# Inline HTML
# ------------------------------------------------------------------------------

MD033:
  allowed_elements:
    - br
    - sub
    - sup
    - details
    - summary
    - img
    - picture
    - source
    - kbd

# ------------------------------------------------------------------------------
# Images
# ------------------------------------------------------------------------------

MD045: true

# ------------------------------------------------------------------------------
# File Naming
# ------------------------------------------------------------------------------

MD051: true
