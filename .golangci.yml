# ==============================================================================
# BeaconLink
# .golangci.yml
#
# Documentation:
# https://golangci-lint.run/
# ==============================================================================

version: "2"

run:
  timeout: 5m

  tests: true

  allow-parallel-runners: true

  modules-download-mode: readonly

  issues-exit-code: 1

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none

  enable:
    # --------------------------------------------------------------------------
    # Bugs
    # --------------------------------------------------------------------------
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # --------------------------------------------------------------------------
    # Code Quality
    # --------------------------------------------------------------------------
    - revive
    - gosimple
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - exhaustive
    - gocritic
    - makezero
    - misspell
    - nilerr
    - noctx
    - predeclared
    - reassign
    - sqlclosecheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace

    # --------------------------------------------------------------------------
    # Complexity
    # --------------------------------------------------------------------------
    - cyclop
    - gocognit
    - nestif

    # --------------------------------------------------------------------------
    # Style
    # --------------------------------------------------------------------------
    - asciicheck
    - bidichk
    - decorder
    - dogsled
    - errname
    - goconst
    - godot
    - gofmt
    - goimports
    - intrange
    - lll
    - nilnil
    - nolintlint
    - perfsprint
    - tagliatelle
    - testpackage
    - thelper
    - usetesting

linters-settings:
  cyclop:
    max-complexity: 20

  gocognit:
    min-complexity: 20

  dupl:
    threshold: 150

  lll:
    line-length: 120

  misspell:
    locale: US

  govet:
    enable-all: false

  revive:
    confidence: 0.8

    rules:
      - name: exported
      - name: package-comments
      - name: indent-error-flow
      - name: var-naming
      - name: error-return
      - name: error-strings
      - name: receiver-naming
      - name: empty-block
      - name: superfluous-else
      - name: unnecessary-stmt
      - name: unreachable-code
      - name: unused-parameter

  goimports:
    local-prefixes: github.com/vishwanathdvgmm/beaconlink

issues:
  max-issues-per-linter: 0

  max-same-issues: 0

  uniq-by-line: true

  exclude-dirs-use-default: true

  exclude-generated: strict

  fix: false

  new: false

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/vishwanathdvgmm/beaconlink

severity:
  default: error

exclusions:
  generated: strict

  presets:
    - comments
    - common-false-positives
    - legacy

  paths:
    - vendor
    - third_party
    - examples
    - testdata
    - web
    - dist
    - bin

  rules:
    # Generated code
    - path: ".*\\.pb\\.go"
      linters:
        - all

    - path: ".*_string\\.go"
      linters:
        - all

    - path: ".*mock.*\\.go"
      linters:
        - all

    # Tests
    - path: "_test\\.go"

      linters:
        - cyclop
        - dupl
        - gocognit
        - nestif
        - lll

    # Examples
    - path: "^examples/"
      linters:
        - revive
        - dupl
        - lll
