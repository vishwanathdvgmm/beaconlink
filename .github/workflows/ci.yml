name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify Go modules
        run: go mod verify

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files need formatting:"
            echo "$files"
            exit 1
          fi

      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Verify imports
        run: |
          files=$(goimports -l .)
          if [ -n "$files" ]; then
            echo "The following files need import formatting:"
            echo "$files"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Build
        run: |
          go build -v ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  frontend:
    if: false
    name: Frontend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test

  repository:
    name: Repository Validation

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          find scripts -name "*.sh" -exec bash -n {} \;

      - name: Validate YAML
        run: |
          python - <<'EOF'
          import pathlib
          import yaml

          for path in pathlib.Path(".").rglob("*.yml"):
              with open(path, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)

          for path in pathlib.Path(".").rglob("*.yaml"):
              with open(path, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
          EOF

      - name: Verify documentation exists
        run: |
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODE_OF_CONDUCT.md
          test -f CODEOWNERS

  success:
    name: CI Status

    runs-on: ubuntu-latest

    needs:
      - backend
      - repository

    steps:
      - name: Success
        run: echo "BeaconLink CI completed successfully."
